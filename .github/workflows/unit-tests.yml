name: Run Unit Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r services/fake-ehr-producer/requirements.txt
          pip install -r services/validation-service/requirements.txt
          pip install -r services/normalization-service/requirements.txt
          pip install -r services/persistence-service/requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest
